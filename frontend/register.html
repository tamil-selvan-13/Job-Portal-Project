<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - JobPortal</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div id="toast-container"></div>

<div class="center fade-in">
  <div class="card form-box">
    <h2><i class="fa-solid fa-user-plus" style="color: #38bdf8;"></i> Create Account</h2>

    <form id="registerForm">
      <div style="position: relative;">
        <i class="fa-solid fa-user" style="position: absolute; left: 15px; top: 17px; color: #94a3b8;"></i>
        <input id="name" placeholder="Full Name" required style="padding-left: 45px;">
      </div>
      <div style="position: relative;">
        <i class="fa-solid fa-envelope" style="position: absolute; left: 15px; top: 17px; color: #94a3b8;"></i>
        <input id="email" type="email" placeholder="Email Address" required style="padding-left: 45px;">
      </div>
      <div style="position: relative;">
        <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 17px; color: #94a3b8;"></i>
        <input id="password" type="password" placeholder="Password" required style="padding-left: 45px;">
      </div>
      <button type="submit"><i class="fa-solid fa-user-check"></i> Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login here</a></p>
    <div style="margin-top: 20px;">
        <a href="index.html" style="font-size: 0.85rem; color: #94a3b8;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
