<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2 id="welcome"></h2>

    <button onclick="logout()">Logout</button>
    <button onclick="viewApplications()">My Applications</button>

    <h3>Available Jobs</h3>

    <input type="text" id="search" placeholder="Search job..." onkeyup="searchJob()">

    <ul id="jobList">
        <li>
            <span>Frontend Developer</span>
            <button onclick="applyJob('Frontend Developer')">Apply</button>
        </li>

        <li>
            <span>Backend Developer</span>
            <button onclick="applyJob('Backend Developer')">Apply</button>
        </li>

        <li>
            <span>Full Stack Developer</span>
            <button onclick="applyJob('Full Stack Developer')">Apply</button>
        </li>
    </ul>

</div>

<script src="script.js"></script>

<!-- 🔐 LOGIN PROTECTION -->
<script>
let user = JSON.parse(localStorage.getItem("loggedInUser"));

if (!user) {
    alert("Please login first!");
    window.location.href = "login.html";
} else {
    document.getElementById("welcome").innerText = "Welcome " + user.name;
}
</script>

</body>
</html>
